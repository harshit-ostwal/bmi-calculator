<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitSnap - BMI Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body id="smooth-wrapper">
    <main id="smooth-content">
      <nav class="container">
        <h3>
          <a href="/index.html">Fit<i>Snap</i></a>
        </h3>
        <button class="btn">
          Get Started
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-arrow-right-icon lucide-arrow-right"
          >
            <path d="M5 12h14" />
            <path d="m12 5 7 7-7 7" />
          </svg>
        </button>
      </nav>

      <section id="hero" class="container">
        <div class="content">
          <h1>
            Minimal <i>effort.</i> <br />
            Meaningful <i>insights.</i>
          </h1>
          <p>
            Know your numbers, understand your body, and take control of your
            health with confidence.
          </p>
        </div>
        <div class="cta">
          <button class="btn primary">
            Get Started
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-arrow-right-icon lucide-arrow-right"
            >
              <path d="M5 12h14" />
              <path d="m12 5 7 7-7 7" />
            </svg>
          </button>
          <button class="btn">
            View History
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-undo2-icon lucide-undo-2"
            >
              <path d="M9 14 4 9l5-5" />
              <path
                d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5a5.5 5.5 0 0 1-5.5 5.5H11"
              />
            </svg>
          </button>
        </div>
        <div class="blob"></div>
      </section>

      <section id="bmi" class="container">
        <h2><i>BMI</i> Categories</h2>
        <div class="bmi-categories" id="bmi-categories"></div>
      </section>

      <section id="features" class="container">
        <h2><i>Our</i> Features</h2>
        <div class="feature-cards" id="feature-cards"></div>
      </section>

      <footer class="container">
        <h1>Fit<i>Snap</i></h1>
        <p>
          &copy;
          <script>
            document.write(new Date().getFullYear());
          </script>
          FitSnap. All rights reserved.
        </p>
      </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll/bundled/locomotive-scroll.min.js"></script>
    <script>
      const locomotiveScroll = new LocomotiveScroll();
    </script>
    <script src="script.js"></script>
  </body>
</html>
